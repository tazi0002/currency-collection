<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main>
    <section class="inventory" id="inventory" aria-labelledby="inventory-title">
      <div class="page-title">
        <div>
          <p class="eyebrow">Currency Collection</p>
          <h1 id="inventory-title">Inventory</h1>
        </div>
        <div class="summary-strip" aria-label="Collection summary">
          <span><strong id="coinCount">0</strong> coins</span>
          <span><strong id="banknoteCount">0</strong> banknotes</span>
          <span><strong id="totalItems">0</strong> total</span>
        </div>
      </div>

      <div class="collection-tabs" role="tablist" aria-label="Collection view">
        <button class="collection-tab is-active" type="button" data-view="inventory" aria-selected="true">Inventory</button>
        <button class="collection-tab" type="button" data-view="missing" aria-selected="false">Missing</button>
      </div>

      <div class="display-options" aria-label="Result view">
        <span>View</span>
        <button class="view-option is-active" type="button" data-card-view="images" aria-pressed="true">Image</button>
        <button class="view-option" type="button" data-card-view="list" aria-pressed="false">List</button>
      </div>

      <div class="sticky-tools">
        <form class="filters" id="filters" aria-label="Inventory filters">
          <label class="filter-search">
            Keyword
            <input id="searchFilter" type="search" placeholder="Search name, country, notes...">
          </label>

          <button class="mobile-filter-toggle" type="button" id="mobileFilterToggle" aria-expanded="false" aria-controls="filters">
            Filter
          </button>

          <label>
            Type
            <select id="typeFilter">
              <option value="all">All types</option>
              <option value="coin">Coins</option>
              <option value="banknote">Banknotes</option>
            </select>
          </label>

          <label>
            Country
            <select id="countryFilter">
              <option value="all">All countries</option>
            </select>
          </label>

          <label>
            Value
            <select id="valueFilter">
              <option value="all">All values</option>
            </select>
          </label>

          <label>
            Collection set
            <select id="setFilter">
              <option value="all">All sets</option>
            </select>
          </label>

          <label>
            Year
            <select id="yearFilter">
              <option value="all">All years</option>
            </select>
          </label>

          <div class="sort-label">
            <span>Sort by</span>
            <button class="sort-select" type="button" id="sortSelect" aria-expanded="false">Year &#8595;</button>
            <div class="sort-menu" id="sortMenu" hidden>
              <button type="button" data-sort-key="year">Year &#8595;</button>
              <button type="button" data-sort-key="value">Value</button>
            </div>
          </div>

          <button class="reset-button" type="button" id="resetFilters">Clear filter</button>
        </form>

        <div class="result-line">
          <p><strong id="resultCount">0</strong> item(s) found. Showing <strong id="shownCount">0</strong>.</p>
        </div>
      </div>

      <div class="inventory-grid view-images" id="inventoryGrid" aria-live="polite"></div>
      <p class="empty-state" id="emptyState" hidden>No inventory items match these filters.</p>
      <button class="see-more-button" type="button" id="seeMoreButton" hidden>See more</button>
    </section>
  </main>


  <div class="coin-overlay" id="coinOverlay" hidden>
    <div class="coin-overlay-panel" role="dialog" aria-modal="true" aria-label="Coin image viewer">
      <button class="overlay-close" type="button" id="overlayClose" aria-label="Close coin viewer">X</button>
      <div class="overlay-stage">
        <aside class="overlay-details" id="overlayDetails" aria-label="Currency details"></aside>
        <button class="overlay-coin coin-flip" type="button" id="overlayCoin" aria-label="Flip enlarged currency image">
          <span class="coin-flip-inner" id="overlayCoinInner"></span>
        </button>
      </div>
      <div class="overlay-nav-row">
        <button class="overlay-nav overlay-prev" type="button" id="overlayPrev" aria-label="Previous item">&#8592;</button>
        <button class="overlay-nav overlay-next" type="button" id="overlayNext" aria-label="Next item">&#8594;</button>
      </div>
    </div>
  </div>
  <script src="js/inventory.js"></script>
  <script src="js/missing-coins.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
